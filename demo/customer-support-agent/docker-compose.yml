# Runs MockAgents + the demo app together.
#
#   docker compose up --build mockagents      # start the mock server
#   docker compose run --rm demo              # run the triage demo (default)
#   docker compose run --rm demo python -m app.deterministic_smoke
#   docker compose run --rm demo python -m app.streaming_demo
#   docker compose run --rm demo python -m app.resilience_demo
#
# MockAgents is built from the repository root (two levels up), the demo app
# from this directory.
services:
  mockagents:
    build:
      context: ../..          # repo root — contains the MockAgents Dockerfile
      dockerfile: Dockerfile
    container_name: acme-mockagents
    ports:
      - "8080:8080"
    volumes:
      # The three demo agent definitions become the server's agents directory.
      - ./mockagents:/agents:ro
      - mockagents-data:/data
    environment:
      MOCKAGENTS_HOST: 0.0.0.0
      MOCKAGENTS_LOG_LEVEL: debug
      # --- Uncomment to exercise the multi-tenancy / quota / cost feature set.
      #     The bootstrap admin key is printed to the logs on first start:
      #       docker compose logs mockagents | grep "Bootstrap admin key"
      # MOCKAGENTS_MULTI_TENANT: "1"
      # MOCKAGENTS_DEFAULT_RATE_PER_SEC: "1"
      # MOCKAGENTS_DEFAULT_RATE_BURST: "2"
      # MOCKAGENTS_DEFAULT_MONTHLY_SPEND_USD: "0.01"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s
    restart: unless-stopped

  demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acme-demo
    depends_on:
      mockagents:
        condition: service_healthy
    environment:
      MOCKAGENTS_BASE_URL: http://mockagents:8080/v1
      MOCKAGENTS_API_KEY: mock-key
    # No restart: it's a one-shot demo runner. `docker compose run --rm demo ...`
    # is the intended way to drive it.
    profiles: ["demo"]

volumes:
  mockagents-data:
