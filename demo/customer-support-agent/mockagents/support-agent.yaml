# Acme Corp customer-support TRIAGE agent — the main fixture the demo app drives.
#
# Demonstrates: scenario matching + simulated tool calls + SSE streaming.
#
# How the agent loop terminates deterministically
# ------------------------------------------------
# MockAgents only sees the *latest user message* when matching, and an agent
# framework's tool-calling loop keeps that user message identical across turns
# (the tool result comes back with role "tool", not "user"). So we gate the
# tool-call scenarios on `turn_number: 1` and let turn 2 fall through to a
# resolution scenario. For turn numbers to be meaningful the client must send a
# STABLE `X-Session-Id` header for the whole conversation — the demo app sets a
# fresh one per conversation (see app/mock_setup.py). Without it, every request
# is turn 1 and the loop would never terminate.
#
# Tool names here MUST match the @function_tool names the demo app registers
# (lookup_order / issue_refund / escalate_to_human) and the argument keys must
# match those functions' parameters, so the SDK can execute the returned call.
apiVersion: mockagents/v1
kind: Agent
metadata:
  name: acme-support
  description: Acme Corp tier-1 support triage agent (tools + scenarios + streaming).
  tags: [demo, customer-support, tools, streaming]

spec:
  protocol: openai-chat-completions
  # Real, already-priced model name as the routing key: it makes the "drop-in
  # replacement" story concrete (point your gpt-4o app here) AND lets the cost
  # table attribute non-zero cost so the spend dashboard / quota cap work.
  # Routing is by model name, so each demo agent uses a DISTINCT priced model:
  #   acme-support  -> gpt-4o   |  flaky -> gpt-4o-mini  |  load -> gpt-3.5-turbo
  model: gpt-4o
  systemPrompt: |
    You are Acme Corp's friendly tier-1 customer-support triage agent.
    Use tools to look up orders, issue refunds, or escalate to a human.

  tools:
    - name: lookup_order
      description: Look up the status of an order by its ID.
      parameters:
        type: object
        properties:
          order_id: { type: string }
        required: [order_id]
      responses:
        - match: { order_id: "ORD-12345" }
          response:
            status: shipped
            carrier: UPS
            tracking: "1Z999AA10123456784"
            eta: "2026-04-10"
        - default: true
          response:
            status: processing
            eta: "2026-04-13"

    - name: issue_refund
      description: Issue a refund against an order.
      parameters:
        type: object
        properties:
          order_id: { type: string }
          amount: { type: number }
        required: [order_id, amount]
      responses:
        - default: true
          response:
            refund_id: "RF-88231"
            state: approved
            posts_in_days: 5

    - name: escalate_to_human
      description: Open a ticket and hand the conversation to a human specialist.
      parameters:
        type: object
        properties:
          reason: { type: string }
        required: [reason]
      responses:
        - default: true
          response:
            ticket_id: "SUP-1042"
            queue: tier-2
            sla_minutes: 60

  behavior:
    scenarios:
      # --- Single-turn: a greeting needs no tool, so the loop ends in one turn.
      - name: greeting
        match: { content_contains: "hello" }
        response:
          content: "Hi! I'm Acme's support assistant. I can check an order, start a refund, or connect you with a human. What do you need?"

      # --- Escalation flow (turn 1 = tool call, turn 2 = resolution).
      - name: escalate
        match: { content_contains: "human", turn_number: 1 }
        response:
          content: "Of course — let me get a specialist involved."
          tool_calls:
            - name: escalate_to_human
              arguments: { reason: "Customer requested a human agent" }
      - name: escalate-resolved
        match: { content_contains: "human", turn_number: 2 }
        response:
          content: "You're all set — I've opened ticket SUP-1042 and a tier-2 specialist will reach out within the hour. Anything else?"

      # --- Refund flow (turn 1 = tool call, turn 2 = resolution).
      - name: refund
        match: { content_contains: "refund", turn_number: 1 }
        response:
          content: "I can take care of that refund for you."
          tool_calls:
            - name: issue_refund
              arguments: { order_id: "ORD-12345", amount: 49.99 }
      - name: refund-resolved
        match: { content_contains: "refund", turn_number: 2 }
        response:
          content: "Done — refund RF-88231 for $49.99 is approved and will post to your original payment method within 5 business days."

      # --- Order-status flow (turn 1 = tool call, turn 2 = resolution).
      - name: order-lookup
        match: { content_contains: "order", turn_number: 1 }
        response:
          content: "Let me pull that order up for you."
          tool_calls:
            - name: lookup_order
              arguments: { order_id: "ORD-12345" }
      - name: order-resolved
        match: { content_contains: "order", turn_number: 2 }
        response:
          content: "Good news — order ORD-12345 shipped via UPS (tracking 1Z999AA10123456784) and should arrive by 2026-04-10. Anything else?"

      # --- Fallback: also catches the 2nd turn of any flow that has no explicit
      #     resolution scenario, so the agent loop always terminates cleanly.
      - name: default
        response:
          content: "Thanks for contacting Acme support! Could you share your order ID or tell me whether you need an order status, a refund, or a human agent?"

    # SSE streaming so `Runner.run_streamed` (and curl stream:true) emit token deltas.
    streaming:
      enabled: true
      chunk_size: 4
      chunk_delay_ms: 30
