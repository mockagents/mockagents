# Runs the demo app as a Kubernetes Job against the in-cluster MockAgents
# service. Build + load the image into your cluster first (see TESTING.md):
#
#   docker build -t acme-support-demo:latest .
#   kind load docker-image acme-support-demo:latest        # kind
#   # or: minikube image load acme-support-demo:latest      # minikube
#   # or: push to a registry your cluster can pull from
#
#   kubectl apply -f k8s/demo-job.yaml -n acme-demo
#   kubectl logs -f job/acme-demo -n acme-demo
#
# The service name "acme-mockagents" assumes `helm install acme ...`
# (release name "acme"). Adjust MOCKAGENTS_BASE_URL if your release differs.
apiVersion: batch/v1
kind: Job
metadata:
  name: acme-demo
  labels:
    app.kubernetes.io/name: acme-support-demo
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: acme-support-demo
    spec:
      restartPolicy: Never
      containers:
        - name: demo
          image: acme-support-demo:latest
          imagePullPolicy: IfNotPresent
          # Override to run a different scenario, e.g.:
          #   ["python","-m","app.deterministic_smoke"]
          #   ["python","-m","app.streaming_demo"]
          #   ["python","-m","app.resilience_demo"]
          command: ["python", "-m", "app.triage_demo"]
          env:
            - name: MOCKAGENTS_BASE_URL
              value: "http://acme-mockagents:8080/v1"
            - name: MOCKAGENTS_API_KEY
              value: "mock-key"
