# Helm values for deploying MockAgents (the existing chart at
# deploy/helm/mockagents) with the demo's agents + feature env.
#
# Agent definitions are supplied via a ConfigMap you create from the demo's
# mockagents/ directory (single source of truth — no YAML duplication here):
#
#   kubectl create configmap acme-agents \
#     --from-file=../mockagents/ -n acme-demo
#
# Then install:
#
#   helm install acme ../../deploy/helm/mockagents \
#     -n acme-demo --create-namespace \
#     -f mockagents-values.yaml
#
# (Run both from demo/customer-support-agent/k8s/.)

agents:
  existingConfigMap: acme-agents

# NodePort makes the server reachable from the host for local clusters
# (kind/minikube/k3s). Use ClusterIP + port-forward in a real cluster.
service:
  type: NodePort
  port: 8080
  nodePort: 30080

logLevel: debug

# Enable an emptyDir at /data for the SQLite interaction log (powers /costs).
persistence:
  enabled: true

# --- Feature toggles -------------------------------------------------------
# Uncomment the env block to turn on multi-tenancy + quotas. After the pod
# starts, grab the bootstrap platform key from the logs:
#
#   kubectl -n acme-demo logs deploy/acme-mockagents | grep "Bootstrap admin key"
#
env: {}
# env:
#   MOCKAGENTS_MULTI_TENANT: "1"
#   MOCKAGENTS_DEFAULT_RATE_PER_SEC: "1"
#   MOCKAGENTS_DEFAULT_RATE_BURST: "2"
#   MOCKAGENTS_DEFAULT_MONTHLY_SPEND_USD: "0.01"
#   MOCKAGENTS_LOG_LEVEL: "debug"
