# Runs the Google ADK demo app as a Kubernetes Job against the in-cluster
# MockAgents service. Build + load the image first (see TESTING.md):
#
#   docker build -t acme-adk-support-demo:latest .
#   kind load docker-image acme-adk-support-demo:latest      # kind
#   # or: minikube image load acme-adk-support-demo:latest
#
#   kubectl apply -f k8s/demo-job.yaml -n acme-adk
#   kubectl logs -f job/acme-adk-demo -n acme-adk
#
# Service name "acme-mockagents" assumes `helm install acme ...`.
apiVersion: batch/v1
kind: Job
metadata:
  name: acme-adk-demo
  labels:
    app.kubernetes.io/name: acme-adk-support-demo
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: acme-adk-support-demo
    spec:
      restartPolicy: Never
      containers:
        - name: demo
          image: acme-adk-support-demo:latest
          imagePullPolicy: IfNotPresent
          # Override to run a different scenario, e.g.
          #   ["python","-m","app.litellm_demo"]
          #   ["python","-m","app.deterministic_smoke"]
          command: ["python", "-m", "app.triage_demo"]
          env:
            # Server ROOT (no /v1) — the native Gemini path uses it directly.
            - name: MOCKAGENTS_BASE_URL
              value: "http://acme-mockagents:8080"
            - name: MOCKAGENTS_API_KEY
              value: "mock-key"
