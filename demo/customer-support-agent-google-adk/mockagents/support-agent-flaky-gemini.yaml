# Flaky twin of the Gemini support agent — for the RESILIENCE demo.
#
# Demonstrates: chaos / fault injection. First 2 requests 503 (UNAVAILABLE), then
# recover. Point a client with retry/backoff at model "gemini-2.5-flash" to prove
# its retry logic recovers. The fail-first counter resets when the server restarts.
apiVersion: mockagents/v1
kind: Agent
metadata:
  name: acme-support-flaky-gemini
  description: Gemini support agent that 503s its first 2 requests then recovers.
  tags: [demo, gemini, chaos, retry]

spec:
  protocol: google-gemini
  model: gemini-2.5-flash   # distinct + priced routing key
  behavior:
    chaos:
      errors:
        fail_first: 2
        status_code: 503
        message: "the model is temporarily overloaded, please retry"
    scenarios:
      - name: default
        response:
          content: "Recovered — Acme support is healthy again. How can I help?"
    streaming:
      enabled: true
      chunk_size: 8
      chunk_delay_ms: 10
