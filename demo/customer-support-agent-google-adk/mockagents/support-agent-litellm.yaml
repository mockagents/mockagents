# Acme support triage agent for the LiteLLM-bridge path (OpenAI wire format).
#
# Used when Google ADK reaches MockAgents via its LiteLlm wrapper pointed at the
# OpenAI-compatible endpoint (/v1/chat/completions) instead of the native Gemini
# endpoint. LiteLLM sends OpenAI-format requests, where a tool result comes back
# as a role:"tool" message — which MockAgents does NOT surface as the latest user
# message. So (unlike the Gemini agents) this one gates the tool-call scenarios on
# `turn_number: 1`; the demo sets a stable per-conversation X-Session-Id so the
# turn counter advances (see app/litellm_setup.py).
apiVersion: mockagents/v1
kind: Agent
metadata:
  name: acme-support-litellm
  description: Acme triage agent over the OpenAI wire format (for the ADK LiteLLM bridge).
  tags: [demo, openai, litellm, tools]

spec:
  protocol: openai-chat-completions
  model: gpt-4o   # LiteLlm(model="openai/gpt-4o") sends this; distinct + priced
  systemPrompt: |
    You are Acme Corp's friendly tier-1 customer-support triage agent.

  tools:
    - name: lookup_order
      description: Look up the status of an order by its ID.
      parameters:
        type: object
        properties:
          order_id: { type: string }
        required: [order_id]
      responses:
        - default: true
          response: { status: shipped, carrier: UPS, tracking: "1Z999AA10123456784" }
    - name: issue_refund
      description: Issue a refund against an order.
      parameters:
        type: object
        properties:
          order_id: { type: string }
          amount: { type: number }
        required: [order_id, amount]
      responses:
        - default: true
          response: { refund_id: RF-88231, state: approved }
    - name: escalate_to_human
      description: Open a ticket and hand off to a human specialist.
      parameters:
        type: object
        properties:
          reason: { type: string }
        required: [reason]
      responses:
        - default: true
          response: { ticket_id: SUP-1042, queue: tier-2 }

  behavior:
    scenarios:
      - name: greeting
        match: { content_contains: "hello" }
        response:
          content: "Hi! I'm Acme's support assistant. I can check an order, start a refund, or connect you with a human. What do you need?"

      # turn 1 -> tool call; turn 2 (same X-Session-Id) -> resolution.
      - name: escalate
        match: { content_contains: "human", turn_number: 1 }
        response:
          content: "Of course — let me get a specialist involved."
          tool_calls:
            - name: escalate_to_human
              arguments: { reason: "Customer requested a human agent" }
      - name: escalate-resolved
        match: { content_contains: "human", turn_number: 2 }
        response:
          content: "You're all set — I've opened ticket SUP-1042 and a tier-2 specialist will reach out within the hour. Anything else?"
      - name: refund
        match: { content_contains: "refund", turn_number: 1 }
        response:
          content: "I can take care of that refund for you."
          tool_calls:
            - name: issue_refund
              arguments: { order_id: "ORD-12345", amount: 49.99 }
      - name: refund-resolved
        match: { content_contains: "refund", turn_number: 2 }
        response:
          content: "Done — refund RF-88231 for $49.99 is approved and will post within 5 business days."
      - name: order-lookup
        match: { content_contains: "order", turn_number: 1 }
        response:
          content: "Let me pull that order up for you."
          tool_calls:
            - name: lookup_order
              arguments: { order_id: "ORD-12345" }
      - name: order-resolved
        match: { content_contains: "order", turn_number: 2 }
        response:
          content: "Good news — order ORD-12345 shipped via UPS (tracking 1Z999AA10123456784) and should arrive by 2026-04-10. Anything else?"

      - name: default
        response:
          content: "Thanks for contacting Acme support! Could you share your order ID, or tell me whether you need an order status, a refund, or a human agent?"

    streaming:
      enabled: true
      chunk_size: 6
      chunk_delay_ms: 15
