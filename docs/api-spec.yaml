openapi: 3.1.0
info:
  title: MockAgents API
  version: 0.3.0-dev
  description: >
    MockAgents is a platform for mocking AI agent integrations. It exposes a
    Management API (agents, interaction logs, costs, audit, pipelines, config
    validation, and a multi-tenant control plane of tenants + RBAC API keys),
    and Protocol Endpoints that mimic real LLM provider APIs (OpenAI Chat
    Completions and Anthropic Messages).


    The Model Context Protocol mock (`/mcp`, `/mcp/events`, `/mcp/response`) is
    JSON-RPC 2.0 rather than REST and is documented in the project README and
    `docs/sequence-diagrams.md`, not in this OpenAPI document.


    **Authentication.** When the server runs with `MOCKAGENTS_MULTI_TENANT=1`,
    every `/api/v1/*` management route requires an API key
    (`Authorization: Bearer <key>` or `X-Api-Key: <key>`) whose role meets the
    route's floor (`viewer < editor < admin < platform`). In single-tenant mode
    the management API is open. The protocol endpoints (`/v1/*`) are always
    unauthenticated — clients send their own provider key, which MockAgents
    ignores.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Health
    description: Server health and status
  - name: Agents
    description: Manage mock agent definitions
  - name: Logs
    description: Interaction logs (query, detail, stream, metrics)
  - name: Costs
    description: Estimated spend aggregated from interaction logs
  - name: Audit
    description: Append-only control-plane audit log
  - name: Pipelines
    description: Multi-agent pipeline topologies
  - name: Config
    description: Server-side YAML validation
  - name: Tenants
    description: Multi-tenant control plane (multi-tenant mode)
  - name: Keys
    description: API-key lifecycle — mint, rotate, role change, delete
  - name: Models
    description: OpenAI-compatible model listing
  - name: OpenAI
    description: OpenAI-compatible protocol endpoint
  - name: Anthropic
    description: Anthropic-compatible protocol endpoint

paths:
  # ---------------------------------------------------------------------------
  # Management API
  # ---------------------------------------------------------------------------
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns server health status, version, uptime, and number of loaded agents.
      tags: [Health]
      responses:
        "200":
          description: Server is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/agents:
    get:
      operationId: listAgents
      summary: List all loaded agents
      description: Returns a summary array of every agent currently loaded in the server.
      tags: [Agents]
      responses:
        "200":
          description: List of agent summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentSummary"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/agents/{name}:
    get:
      operationId: getAgent
      summary: Get full agent definition
      description: Returns the complete parsed agent configuration for the given agent name.
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          description: Unique agent name.
          schema:
            type: string
      responses:
        "200":
          description: Full agent definition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDefinition"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/agents/{name}/reload:
    post:
      operationId: reloadAgent
      summary: Reload an agent definition from disk
      description: >
        Re-reads the named agent's definition file from disk and reloads it into
        the server. Emits an `agent.reloaded` audit event. Requires the `viewer`
        role in multi-tenant mode.
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          description: Agent name.
          schema:
            type: string
      responses:
        "200":
          description: Reload completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReloadResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/logs:
    get:
      operationId: listLogs
      summary: List interaction logs
      description: Returns a paginated list of interaction logs, optionally filtered by agent or session.
      tags: [Logs]
      parameters:
        - name: agent
          in: query
          description: Filter logs by agent name.
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of logs to return.
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          description: Number of logs to skip (for pagination).
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: session_id
          in: query
          description: Filter logs by session ID.
          schema:
            type: string
      responses:
        "200":
          description: List of interaction log summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InteractionLog"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: clearLogs
      summary: Clear all logs
      description: Deletes every stored interaction log.
      tags: [Logs]
      responses:
        "200":
          description: Logs cleared.
          content:
            application/json:
              schema:
                type: object
                required: [deleted_count]
                properties:
                  deleted_count:
                    type: integer
                    description: Number of log entries deleted.
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/logs/{id}:
    get:
      operationId: getLog
      summary: Get full interaction detail
      description: Returns the complete interaction record including full request and response bodies.
      tags: [Logs]
      parameters:
        - name: id
          in: path
          required: true
          description: Interaction log ID.
          schema:
            type: string
      responses:
        "200":
          description: Full interaction detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InteractionDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/costs:
    get:
      operationId: getCosts
      summary: Estimated spend
      description: >
        Aggregates interaction-log usage against the configured price table and
        returns totals plus by-model and by-agent breakdowns. Tenant-scoped in
        multi-tenant mode.
      tags: [Costs]
      parameters:
        - { name: since, in: query, schema: { type: string, format: date-time } }
        - { name: until, in: query, schema: { type: string, format: date-time } }
        - { name: limit, in: query, schema: { type: integer, default: 1000 } }
      responses:
        "200":
          description: Cost report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostReport"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /api/v1/audit:
    get:
      operationId: getAudit
      summary: Query the audit log
      description: >
        Returns append-only control-plane events. Requires `admin` in
        multi-tenant mode.
      tags: [Audit]
      parameters:
        - name: kind
          in: query
          description: Event kind filter.
          schema:
            type: string
            enum: [tenant.created, tenant.deleted, api_key.created, api_key.deleted, api_key.role_changed, api_key.rotated, agent.reloaded, auth.denied]
        - { name: actor, in: query, schema: { type: string } }
        - { name: since, in: query, schema: { type: string, format: date-time } }
        - { name: limit, in: query, schema: { type: integer, default: 100, maximum: 1000 } }
      responses:
        "200":
          description: Audit events.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuditEvent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/pipelines:
    get:
      operationId: listPipelines
      summary: List pipelines
      description: "Returns all loaded `kind: Pipeline` documents."
      tags: [Pipelines]
      responses:
        "200":
          description: Pipelines.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Pipeline" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/pipelines/{name}:
    get:
      operationId: getPipeline
      summary: Get a pipeline (with DAG)
      tags: [Pipelines]
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Pipeline detail including nodes and edges. The `ETag` response header carries the version to echo back as `If-Match` on update.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Pipeline" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: updatePipeline
      summary: Update a pipeline (write-back to disk)
      description: >
        Validate an edited Pipeline definition and, on success, persist it
        atomically to its source file and re-register it so the change is live
        immediately. Requires `editor` in multi-tenant mode. Optimistic
        concurrency: send the `ETag` from GET as `If-Match`; the write is
        rejected if the pipeline changed on disk since it was loaded.
      tags: [Pipelines]
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
        - name: If-Match
          in: header
          required: true
          description: The `ETag` returned by GET. Required for optimistic concurrency.
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Pipeline" }
      responses:
        "200":
          description: Saved. The new version is returned in the `ETag` response header.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Pipeline" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412":
          description: The `If-Match` version no longer matches; the pipeline changed on disk. Reload and re-apply.
        "422":
          description: The edited definition failed validation; the file was not written.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidateResult" }
        "428":
          description: The `If-Match` header is missing.

  /api/v1/config/validate:
    post:
      operationId: validateConfig
      summary: Validate a YAML document
      description: >
        Runs the same validator as `mockagents validate` against an in-memory
        document (Agent / Pipeline / TestSuite / MCPServer). Requires `editor`
        in multi-tenant mode.
      tags: [Config]
      requestBody:
        required: true
        content:
          application/yaml:
            schema: { type: string }
          text/plain:
            schema: { type: string }
      responses:
        "200":
          description: Validation result (ok or structured errors).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidateResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /auth/login:
    get:
      operationId: ssoLogin
      summary: Begin SSO login (OIDC)
      description: >
        Starts the OpenID Connect authorization-code flow (REF-08 slice D):
        sets short-lived state + PKCE cookies and redirects to the configured
        identity provider. Only mounted when OIDC is configured.
      tags: [Auth]
      responses:
        "302":
          description: Redirect to the identity provider's authorization endpoint.

  /auth/callback:
    get:
      operationId: ssoCallback
      summary: Complete SSO login (OIDC callback)
      description: >
        The IdP redirect target. Validates state (CSRF) + PKCE, exchanges the
        code, maps the verified email domain to a tenant, just-in-time
        provisions the user, mints a session, and sets the session cookie.
      tags: [Auth]
      parameters:
        - { name: code, in: query, required: true, schema: { type: string } }
        - { name: state, in: query, required: true, schema: { type: string } }
      responses:
        "302":
          description: On success, sets the session cookie and redirects to the app root.
        "400":
          description: Missing/mismatched state or code.
        "401":
          description: Code exchange failed or the IdP returned no email.
        "403":
          description: The email domain is not mapped to a tenant.

  /auth/logout:
    post:
      operationId: ssoLogout
      summary: Revoke the current SSO session
      description: Revokes the session behind the cookie and clears it.
      tags: [Auth]
      responses:
        "200":
          description: Logged out.

  /api/v1/quota:
    get:
      operationId: getQuota
      summary: Caller tenant's quota limits and usage
      description: >
        Returns the calling tenant's effective per-tenant quota (rate +
        monthly spend) and current-month usage (REF-08 slice C). In
        single-tenant mode the caller has no tenant and sees the unlimited
        defaults. Requires `viewer` in multi-tenant mode.
      tags: [Tenancy]
      responses:
        "200":
          description: Effective limits and current-month usage.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_id: { type: string }
                  limits: { $ref: "#/components/schemas/QuotaConfig" }
                  usage:
                    type: object
                    properties:
                      month: { type: string, example: "2026-06" }
                      spend_usd: { type: number }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/tenants/{id}/quota:
    put:
      operationId: setTenantQuota
      summary: Set a tenant's quota override
      description: >
        Sets a per-tenant quota override (REF-08 slice C). Platform-gated: a
        tenant admin must not raise its own cap, so quota management is a
        cross-tenant operator action.
      tags: [Tenancy]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuotaConfig" }
      responses:
        "200":
          description: Override applied.
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/logs/stream/metrics:
    get:
      operationId: getStreamMetrics
      summary: Live-feed subscriber metrics
      description: >
        Admin-gated snapshot of every connected SSE subscriber's drop count and
        buffer utilization.
      tags: [Logs]
      responses:
        "200":
          description: Broadcaster snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscribers: { type: integer }
                  total_dropped: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # -- Multi-tenant control plane -------------------------------------------
  /api/v1/tenants:
    get:
      operationId: listTenants
      summary: List tenants
      description: Requires the `platform` role.
      tags: [Tenants]
      responses:
        "200":
          description: Tenants.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Tenant" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createTenant
      summary: Create a tenant
      description: Requires the `platform` role.
      tags: [Tenants]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        "201":
          description: Tenant created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        "409": { $ref: "#/components/responses/Conflict" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/tenants/{id}:
    delete:
      operationId: deleteTenant
      summary: Delete a tenant (cascades to its keys)
      description: Requires the `platform` role.
      tags: [Tenants]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted. }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/tenants/{id}/keys:
    get:
      operationId: listAPIKeys
      summary: List a tenant's API keys
      description: Requires `editor`. Per-tenant admins see only their own tenant.
      tags: [Keys]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Keys (no plaintext).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/APIKey" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createAPIKey
      summary: Mint an API key
      description: Requires `admin`. Plaintext is returned exactly once.
      tags: [Keys]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, role]
              properties:
                name: { type: string }
                role: { type: string, enum: [viewer, editor, admin] }
      responses:
        "201":
          description: Key minted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NewKeyResult" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/tenants/{id}/keys/rotate:
    post:
      operationId: bulkRotateTenantKeys
      summary: Rotate every key in a tenant
      description: >
        All-or-nothing transactional rotation. `?except=self` spares the
        caller's own key. Requires `admin`.
      tags: [Keys]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: except, in: query, schema: { type: string, enum: [self] } }
      responses:
        "200":
          description: Rotation results — each with a once-only plaintext.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items: { $ref: "#/components/schemas/NewKeyResult" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/keys/{id}:
    patch:
      operationId: updateAPIKeyRole
      summary: Change an API key's role
      description: Requires `admin`. Emits `api_key.role_changed`.
      tags: [Keys]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [viewer, editor, admin] }
      responses:
        "200":
          description: Updated key.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIKey" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      operationId: deleteAPIKey
      summary: Delete an API key
      description: Requires `admin`. Emits `api_key.deleted`.
      tags: [Keys]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted. }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/keys/{id}/rotate:
    post:
      operationId: rotateAPIKey
      summary: Rotate an API key's secret in place
      description: >
        Preserves id/name/role/tenant; only the secret changes. Flushes the
        auth cache and emits `api_key.rotated` with old + new prefixes. Requires
        `admin`.
      tags: [Keys]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Rotated — plaintext shown once.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NewKeyResult" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/keys/me/rotate:
    post:
      operationId: rotateMyAPIKey
      summary: Rotate the calling key in place
      description: Self-service rotation. Any authenticated role (`viewer`).
      tags: [Keys]
      responses:
        "200":
          description: Rotated — plaintext shown once.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NewKeyResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/keys/me/burn:
    post:
      operationId: burnMyAPIKey
      summary: Rotate the calling key WITHOUT returning the new plaintext
      description: >
        Emergency response to a compromised session — the new secret is never
        returned, so the caller is locked out and must recover out-of-band.
      tags: [Keys]
      responses:
        "204": { description: Burned. }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ---------------------------------------------------------------------------
  # Protocol Endpoints
  # ---------------------------------------------------------------------------
  /v1/models:
    get:
      operationId: listModels
      summary: List models (OpenAI-compatible)
      description: >
        Lists the models exposed by loaded agents. Anonymous callers see
        global-only models; authenticated callers also see their tenant's.
      tags: [Models]
      responses:
        "200":
          description: Model list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  object: { type: string, example: list }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        object: { type: string, example: model }
                        owned_by: { type: string }
  /v1/chat/completions:
    post:
      operationId: openaiChatCompletions
      summary: OpenAI-compatible Chat Completions
      description: >
        Accepts requests in the OpenAI Chat Completions format, matches the
        model name to a loaded mock agent, and returns a mock response that
        follows the OpenAI response schema. Supports both synchronous JSON
        responses and streaming via Server-Sent Events.
      tags: [OpenAI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAIChatCompletionRequest"
      responses:
        "200":
          description: >
            Chat completion response. When `stream` is false (or omitted) the
            response is a single JSON object. When `stream` is true the
            response is a stream of Server-Sent Events with `Content-Type:
            text/event-stream`; each event carries a
            `OpenAIChatCompletionChunk` JSON payload, and the stream ends with
            a `data: [DONE]` sentinel.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIChatCompletionResponse"
            text/event-stream:
              schema:
                description: >
                  SSE stream of `OpenAIChatCompletionChunk` objects. Each
                  event is prefixed with `data: ` followed by a JSON line.
                  The stream terminates with `data: [DONE]`.
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/messages:
    post:
      operationId: anthropicMessages
      summary: Anthropic-compatible Messages
      description: >
        Accepts requests in the Anthropic Messages format, matches the model
        name to a loaded mock agent, and returns a mock response that follows
        the Anthropic response schema. Supports both synchronous JSON
        responses and streaming via Server-Sent Events with Anthropic event
        types (message_start, content_block_start, content_block_delta,
        content_block_stop, message_delta, message_stop).
      tags: [Anthropic]
      parameters:
        - name: x-api-key
          in: header
          description: Anthropic API key (accepted but not validated by the mock).
          schema:
            type: string
        - name: anthropic-version
          in: header
          description: Anthropic API version header.
          schema:
            type: string
            example: "2023-06-01"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessagesRequest"
      responses:
        "200":
          description: >
            Messages response. When `stream` is false (or omitted) the response
            is a single JSON object. When `stream` is true the response is a
            stream of Server-Sent Events with `Content-Type: text/event-stream`;
            each event has an `event:` type field (message_start,
            content_block_start, content_block_delta, content_block_stop,
            message_delta, message_stop) and a `data:` JSON payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicMessagesResponse"
            text/event-stream:
              schema:
                description: >
                  SSE stream using Anthropic event types. Each frame consists
                  of an `event:` line and a `data:` JSON line.
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

# =============================================================================
# Components
# =============================================================================
components:
  # ---------------------------------------------------------------------------
  # Reusable Schemas
  # ---------------------------------------------------------------------------
  schemas:
    # -- Management Schemas ---------------------------------------------------
    HealthResponse:
      type: object
      required: [status, version, uptime_seconds, agents_loaded]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: "0.1.0"
        uptime_seconds:
          type: integer
          example: 3621
        agents_loaded:
          type: integer
          example: 4

    AgentSummary:
      type: object
      required: [name, description, protocol, tags, tools_count, scenarios_count, status]
      properties:
        name:
          type: string
          example: weather-agent
        description:
          type: string
          example: A mock weather-lookup agent.
        protocol:
          type: string
          enum: [openai, anthropic]
        tags:
          type: array
          items:
            type: string
          example: [weather, demo]
        tools_count:
          type: integer
          example: 2
        scenarios_count:
          type: integer
          example: 3
        status:
          type: string
          enum: [active, inactive, error]
          example: active

    AgentDefinition:
      type: object
      description: >
        The full agent configuration as parsed from its YAML/JSON definition
        file on disk. The exact shape depends on the agent author; the
        properties below represent the common top-level fields.
      required: [name, protocol]
      properties:
        name:
          type: string
        description:
          type: string
        protocol:
          type: string
          enum: [openai, anthropic]
        model:
          type: string
          description: The model name this agent responds to.
        tags:
          type: array
          items:
            type: string
        system_prompt:
          type: string
        tools:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Tool definitions exposed by this agent.
        scenarios:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Predefined request/response scenarios.
        config:
          type: object
          additionalProperties: true
          description: Additional agent-specific configuration.

    InteractionLog:
      type: object
      required:
        - id
        - timestamp
        - agent_name
        - session_id
        - protocol
        - request_summary
        - response_summary
        - latency_ms
        - tool_calls_count
      properties:
        id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        agent_name:
          type: string
        session_id:
          type: string
        protocol:
          type: string
          enum: [openai, anthropic]
        request_summary:
          type: string
          description: Truncated or summarised view of the request.
        response_summary:
          type: string
          description: Truncated or summarised view of the response.
        latency_ms:
          type: integer
        tool_calls_count:
          type: integer

    InteractionDetail:
      type: object
      description: Full interaction record with complete request and response bodies.
      required:
        - id
        - timestamp
        - agent_name
        - session_id
        - protocol
        - latency_ms
        - request
        - response
      properties:
        id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        agent_name:
          type: string
        session_id:
          type: string
        protocol:
          type: string
          enum: [openai, anthropic]
        latency_ms:
          type: integer
        tool_calls_count:
          type: integer
        request:
          type: object
          additionalProperties: true
          description: The complete inbound request body.
        response:
          type: object
          additionalProperties: true
          description: The complete outbound response body.
        request_headers:
          type: object
          additionalProperties:
            type: string
        response_headers:
          type: object
          additionalProperties:
            type: string

    Session:
      type: object
      required: [session_id, agent_name, created_at, last_active, message_count]
      properties:
        session_id:
          type: string
        agent_name:
          type: string
        created_at:
          type: string
          format: date-time
        last_active:
          type: string
          format: date-time
        message_count:
          type: integer

    ReloadResponse:
      type: object
      required: [reloaded_count, errors]
      properties:
        reloaded_count:
          type: integer
          example: 4
        errors:
          type: array
          items:
            type: string
          example: []

    # -- Error Schema ---------------------------------------------------------
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: not_found
            message:
              type: string
              example: The requested resource was not found.
            details:
              type: object
              additionalProperties: true

    # -- OpenAI Schemas -------------------------------------------------------
    OpenAIChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          description: >
            Model identifier. MockAgents uses this to resolve the target mock
            agent.
          example: weather-agent
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenAIChatMessage"
          minItems: 1
        tools:
          type: array
          items:
            $ref: "#/components/schemas/OpenAITool"
        tool_choice:
          description: >
            Controls which (if any) tool is called. Can be "none", "auto",
            "required", or an object specifying a particular function.
          oneOf:
            - type: string
              enum: [none, auto, required]
            - type: object
              required: [type, function]
              properties:
                type:
                  type: string
                  enum: [function]
                function:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
        stream:
          type: boolean
          default: false
          description: If true, partial message deltas are sent as SSE events.
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 1
        max_tokens:
          type: integer
          minimum: 1
        top_p:
          type: number
          minimum: 0
          maximum: 1
        frequency_penalty:
          type: number
          minimum: -2
          maximum: 2
        presence_penalty:
          type: number
          minimum: -2
          maximum: 2
        stop:
          description: Up to 4 sequences where the API will stop generating.
          oneOf:
            - type: string
            - type: array
              items:
                type: string
              maxItems: 4
        n:
          type: integer
          minimum: 1
          default: 1
        user:
          type: string

    OpenAIChatMessage:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          description: Message content; string or array of content parts.
          oneOf:
            - type: string
            - type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum: [text, image_url]
                  text:
                    type: string
                  image_url:
                    type: object
                    properties:
                      url:
                        type: string
                        format: uri
        name:
          type: string
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/OpenAIToolCall"
        tool_call_id:
          type: string
          description: Required when role is "tool".

    OpenAITool:
      type: object
      required: [type, function]
      properties:
        type:
          type: string
          enum: [function]
        function:
          type: object
          required: [name]
          properties:
            name:
              type: string
            description:
              type: string
            parameters:
              type: object
              additionalProperties: true
              description: JSON Schema describing the function parameters.

    OpenAIToolCall:
      type: object
      required: [id, type, function]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [function]
        function:
          type: object
          required: [name, arguments]
          properties:
            name:
              type: string
            arguments:
              type: string
              description: JSON-encoded arguments string.

    OpenAIChatCompletionResponse:
      type: object
      required: [id, object, created, model, choices, usage]
      properties:
        id:
          type: string
          example: chatcmpl-abc123
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
          description: Unix timestamp.
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            required: [index, message, finish_reason]
            properties:
              index:
                type: integer
              message:
                $ref: "#/components/schemas/OpenAIChatMessage"
              finish_reason:
                type: string
                enum: [stop, length, tool_calls, content_filter]
        usage:
          $ref: "#/components/schemas/OpenAIUsage"
        system_fingerprint:
          type: string

    OpenAIUsage:
      type: object
      required: [prompt_tokens, completion_tokens, total_tokens]
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer

    OpenAIChatCompletionChunk:
      type: object
      description: A single chunk in a streamed Chat Completion response.
      required: [id, object, created, model, choices]
      properties:
        id:
          type: string
        object:
          type: string
          enum: [chat.completion.chunk]
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            required: [index, delta]
            properties:
              index:
                type: integer
              delta:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
                  tool_calls:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        id:
                          type: string
                        type:
                          type: string
                        function:
                          type: object
                          properties:
                            name:
                              type: string
                            arguments:
                              type: string
              finish_reason:
                type:
                  - string
                  - "null"
                enum: [stop, length, tool_calls, content_filter, null]
        usage:
          oneOf:
            - $ref: "#/components/schemas/OpenAIUsage"
            - type: "null"

    # -- Anthropic Schemas ----------------------------------------------------
    AnthropicMessagesRequest:
      type: object
      required: [model, messages, max_tokens]
      properties:
        model:
          type: string
          description: >
            Model identifier. MockAgents uses this to resolve the target mock
            agent.
          example: weather-agent
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
          minItems: 1
        system:
          description: System prompt; string or array of content blocks.
          oneOf:
            - type: string
            - type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum: [text]
                  text:
                    type: string
        tools:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicTool"
        tool_choice:
          type: object
          properties:
            type:
              type: string
              enum: [auto, any, tool]
            name:
              type: string
              description: Required when type is "tool".
        max_tokens:
          type: integer
          minimum: 1
          example: 1024
        stream:
          type: boolean
          default: false
        temperature:
          type: number
          minimum: 0
          maximum: 1
        top_p:
          type: number
          minimum: 0
          maximum: 1
        top_k:
          type: integer
          minimum: 0
        stop_sequences:
          type: array
          items:
            type: string
        metadata:
          type: object
          properties:
            user_id:
              type: string

    AnthropicMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          description: Message content; string or array of content blocks.
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/AnthropicContentBlock"

    AnthropicContentBlock:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [text, image, tool_use, tool_result]
        text:
          type: string
          description: Present when type is "text".
        source:
          type: object
          description: Present when type is "image".
          properties:
            type:
              type: string
              enum: [base64]
            media_type:
              type: string
              enum: [image/jpeg, image/png, image/gif, image/webp]
            data:
              type: string
              format: byte
        id:
          type: string
          description: Tool use ID. Present when type is "tool_use".
        name:
          type: string
          description: Tool name. Present when type is "tool_use".
        input:
          type: object
          additionalProperties: true
          description: Tool input. Present when type is "tool_use".
        tool_use_id:
          type: string
          description: References a tool_use ID. Present when type is "tool_result".
        content:
          description: Tool result content. Present when type is "tool_result".
          oneOf:
            - type: string
            - type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  text:
                    type: string
        is_error:
          type: boolean
          description: Present when type is "tool_result".

    AnthropicTool:
      type: object
      required: [name, input_schema]
      properties:
        name:
          type: string
        description:
          type: string
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the tool input.

    AnthropicMessagesResponse:
      type: object
      required: [id, type, role, content, model, stop_reason, usage]
      properties:
        id:
          type: string
          example: msg_abc123
        type:
          type: string
          enum: [message]
        role:
          type: string
          enum: [assistant]
        content:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicContentBlock"
        model:
          type: string
        stop_reason:
          type:
            - string
            - "null"
          enum: [end_turn, max_tokens, stop_sequence, tool_use, null]
        stop_sequence:
          type:
            - string
            - "null"
        usage:
          $ref: "#/components/schemas/AnthropicUsage"

    AnthropicUsage:
      type: object
      required: [input_tokens, output_tokens]
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer

    AnthropicStreamEvent:
      type: object
      description: >
        Represents one SSE frame in an Anthropic streaming response. The
        `type` field determines which payload fields are present.
      required: [type]
      properties:
        type:
          type: string
          enum:
            - message_start
            - content_block_start
            - content_block_delta
            - content_block_stop
            - message_delta
            - message_stop
            - ping
        message:
          $ref: "#/components/schemas/AnthropicMessagesResponse"
          description: Present on message_start.
        index:
          type: integer
          description: Content block index. Present on content_block_start, content_block_delta, content_block_stop.
        content_block:
          $ref: "#/components/schemas/AnthropicContentBlock"
          description: Present on content_block_start.
        delta:
          type: object
          description: Present on content_block_delta and message_delta.
          properties:
            type:
              type: string
              enum: [text_delta, input_json_delta]
            text:
              type: string
            partial_json:
              type: string
            stop_reason:
              type: string
            stop_sequence:
              type:
                - string
                - "null"
        usage:
          $ref: "#/components/schemas/AnthropicUsage"
          description: Present on message_delta.

    # -- Control-plane Schemas ------------------------------------------------
    Tenant:
      type: object
      required: [id, name, created_at]
      properties:
        id: { type: string, example: ten_e19321097fc42a65 }
        name: { type: string, example: default }
        created_at: { type: string, format: date-time }

    APIKey:
      type: object
      description: Public view of an API key — never includes the secret.
      required: [id, name, prefix, role, created_at]
      properties:
        id: { type: string, example: key_a1b2 }
        name: { type: string, example: ci-bot }
        prefix: { type: string, example: mak_4d00115a, description: Public key prefix (no secret). }
        role: { type: string, enum: [viewer, editor, admin, platform] }
        tenant_id: { type: string }
        created_at: { type: string, format: date-time }
        last_used: { type: string, format: date-time, nullable: true }

    NewKeyResult:
      type: object
      description: Returned once on mint/rotate — carries the only copy of the plaintext.
      required: [key, plaintext]
      properties:
        key: { $ref: "#/components/schemas/APIKey" }
        plaintext:
          type: string
          example: mak_4d00115a_neV5hFQoDiw4ajfeQLvq6vLru6TQkBqz
          description: Shown exactly once; bcrypt-hashed immediately server-side.

    AuditEvent:
      type: object
      required: [kind, actor, timestamp]
      properties:
        kind:
          type: string
          enum: [tenant.created, tenant.deleted, api_key.created, api_key.deleted, api_key.role_changed, api_key.rotated, agent.reloaded, auth.denied]
        actor: { type: string, example: bootstrap-admin }
        tenant_id: { type: string }
        key_id: { type: string }
        role: { type: string }
        remote_ip: { type: string }
        target: { type: string }
        timestamp: { type: string, format: date-time }

    CostReport:
      type: object
      properties:
        total_requests: { type: integer }
        total_prompt_tokens: { type: integer }
        total_completion_tokens: { type: integer }
        total_cost_usd: { type: number, format: double }
        by_model: { type: array, items: { $ref: "#/components/schemas/CostGroup" } }
        by_agent: { type: array, items: { $ref: "#/components/schemas/CostGroup" } }

    CostGroup:
      type: object
      properties:
        key: { type: string }
        requests: { type: integer }
        cost_usd: { type: number, format: double }

    QuotaConfig:
      type: object
      description: Per-tenant quota. A 0 value means "unlimited" for that dimension.
      properties:
        rate_per_sec: { type: number, description: "Sustained request rate; 0 = unlimited." }
        rate_burst: { type: integer, description: "Token-bucket capacity (max burst)." }
        monthly_spend_usd: { type: number, description: "Monthly spend cap in USD; 0 = unlimited." }

    Pipeline:
      type: object
      required: [name]
      properties:
        name: { type: string }
        topology: { type: string, enum: [sequential, parallel, graph] }
        nodes:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              agent: { type: string }
        edges:
          type: array
          items:
            type: object
            properties:
              from: { type: string }
              to: { type: string }
              when_contains: { type: string }

    ValidateResult:
      type: object
      required: [ok, kind, errors]
      properties:
        ok: { type: boolean }
        kind: { type: string, example: Agent }
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }
              line: { type: integer }
              suggestion: { type: string }

  # ---------------------------------------------------------------------------
  # Reusable Responses
  # ---------------------------------------------------------------------------
  responses:
    BadRequest:
      description: The request was malformed or contained invalid parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: bad_request
              message: "Invalid value for parameter 'limit': must be a positive integer."
              details: {}

    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: not_found
              message: The requested resource was not found.
              details: {}

    InternalServerError:
      description: An unexpected server error occurred.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: internal_error
              message: An unexpected error occurred.
              details: {}

    Unauthorized:
      description: Missing or invalid API key (multi-tenant mode).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              message: missing Authorization bearer token or X-Api-Key header
              type: authentication_error

    Forbidden:
      description: Authenticated, but the key's role is below the route's floor.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    Conflict:
      description: The resource already exists (e.g. duplicate tenant name).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  # ---------------------------------------------------------------------------
  # Security Schemes
  # ---------------------------------------------------------------------------
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        `Authorization: Bearer <api-key>`. Required on `/api/v1/*` routes when
        the server runs with `MOCKAGENTS_MULTI_TENANT=1`.
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: "Alternative to `Authorization: Bearer` for the same API key."

# Applies to the management API in multi-tenant mode. Protocol endpoints
# (/v1/*) are always unauthenticated and override this with `security: []`.
security:
  - BearerAuth: []
  - ApiKeyAuth: []
