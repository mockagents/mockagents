version: 2

project_name: mockagents

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: mockagents
    main: ./cmd/mockagents
    binary: mockagents
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: mockagents
    name: mockagents
  draft: false
  prerelease: auto
  name_template: "MockAgents {{ .Version }}"

# Homebrew tap cask (so `brew install mockagents/tap/mockagents` works on macOS).
# Casks distribute the prebuilt binary — the modern Homebrew path for release
# artifacts, and the successor to the deprecated `brews:` formula block. NOTE:
# casks are macOS-only; Linux users install via the binary, `go install`, Docker,
# or the npx/pipx launchers. Pushing the cask needs a PAT with write access to
# the tap repo (HOMEBREW_TAP_TOKEN); the upload auto-SKIPS when that secret is
# absent, so a release never fails just because the tap isn't set up yet — set
# the secret (and create github.com/mockagents/homebrew-tap) to start publishing.
# See docs/RELEASING.md.
homebrew_casks:
  - name: mockagents
    repository:
      owner: mockagents
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/mockagents/mockagents"
    description: "Mock the OpenAI, Anthropic & Gemini APIs for testing AI agents — zero LLM calls"
    skip_upload: '{{ if eq .Env.HOMEBREW_TAP_TOKEN "" }}true{{ else }}false{{ end }}'

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
