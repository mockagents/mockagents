version: 2

project_name: mockagents

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: mockagents
    main: ./cmd/mockagents
    binary: mockagents
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: mockagents
    name: mockagents
  draft: false
  prerelease: auto
  name_template: "MockAgents {{ .Version }}"

# Homebrew tap formula (so `brew install mockagents/tap/mockagents` works).
# Pushing the formula needs a PAT with write access to the tap repo, passed as
# HOMEBREW_TAP_TOKEN. The upload auto-SKIPS when that secret is absent, so a
# release never fails just because the tap isn't set up yet — set the secret
# (and create github.com/mockagents/homebrew-tap) to start publishing the
# formula. See docs/RELEASING.md.
brews:
  - name: mockagents
    repository:
      owner: mockagents
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/mockagents/mockagents"
    description: "Mock the OpenAI, Anthropic & Gemini APIs for testing AI agents — zero LLM calls"
    license: "Apache-2.0"
    skip_upload: '{{ if eq .Env.HOMEBREW_TAP_TOKEN "" }}true{{ else }}false{{ end }}'
    install: |
      bin.install "mockagents"
    test: |
      system "#{bin}/mockagents", "--version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
