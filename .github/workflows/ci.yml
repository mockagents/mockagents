name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel an in-progress run when a newer commit is pushed to the same branch/PR,
# so rapid pushes don't stack up billable runner minutes (only the latest commit
# is ever fully tested).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-go:
    name: Go Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Linux (1× billing, carries the race detector) + Windows (2×, the
        # cross-platform / no-cgo guard). macOS is intentionally omitted: at a
        # 10× minutes multiplier it dominated CI cost while adding little signal
        # for pure-Go code already covered by the Linux+Windows legs. Run the
        # full matrix locally on macOS if you touch OS-specific paths.
        os: [ubuntu-latest, windows-latest]
        go-version: ["1.26"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      # The race detector needs CGO_ENABLED=1 + a C compiler. The Linux runner
      # always ships one, so it carries race coverage for the shared,
      # platform-independent code. The Windows leg runs the suite without -race
      # so the job never depends on whatever C toolchain happens to be on the
      # runner image (the build itself is pure-Go, no cgo).
      # See CONTRIBUTING.md "Race detection".
      - name: Run tests (race detector)
        if: runner.os != 'Windows'
        run: go test ./... -count=1 -race -timeout 5m

      - name: Run tests (no race — pure-Go, no cgo toolchain assumed)
        if: runner.os == 'Windows'
        run: go test ./... -count=1 -timeout 5m

      - name: Build binary
        run: go build -o mockagents ./cmd/mockagents/

      - name: Validate examples
        run: ./mockagents validate examples/

  # The tenancy Store has two backends (SQLite + Postgres). The matrix job above
  # exercises the SQLite leg everywhere; this Linux-only job spins up a real
  # Postgres service so the Store conformance suite's Postgres leg runs in CI
  # too (it is skipped without MOCKAGENTS_TEST_PG_DSN). Service containers only
  # work on Linux runners, hence the separate job.
  test-go-postgres:
    name: Go Tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tenancy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Download dependencies
        run: go mod download
      - name: Store conformance against Postgres
        env:
          MOCKAGENTS_TEST_PG_DSN: postgres://postgres:test@localhost:5432/tenancy?sslmode=disable
        run: go test ./internal/tenancy/ -run TestStoreConformance -count=1 -v

  test-python:
    name: Python SDK Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        # The supported bookends only — 3.10 (min) and 3.13 (max). The SDK is
        # pure-Python with no version-specific code paths, so the intermediate
        # minors rarely diverge; testing the ends bounds the support range at
        # half the runner minutes.
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SDK
        working-directory: sdk/python
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: sdk/python
        run: python -m pytest tests/ -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Go vet
        run: go vet ./...

      - name: Go build (verify compilation)
        run: go build ./...

      # Fast guard (REF-06): every internal $ref in docs/api-spec.yaml must
      # resolve, and the license string must agree (Apache-2.0) across the
      # root LICENSE, both SDK manifests, and the OpenAPI info block. Fails
      # loudly on drift so a renamed component or a manifest regenerated back
      # to MIT can't slip in. The tool's own unit tests run in the Go job.
      - name: API/SDK drift check
        run: go run ./tools/driftcheck

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mockagents:ci-test .

      - name: Verify image size
        run: |
          SIZE=$(docker image inspect mockagents:ci-test --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 50 ]; then
            echo "Warning: Image size ${SIZE_MB}MB exceeds 50MB target"
          fi

      - name: Smoke test
        run: |
          docker run -d --name mockagents-test \
            -p 8080:8080 \
            -v ${{ github.workspace }}/examples:/agents:ro \
            mockagents:ci-test
          sleep 3
          curl -sf http://localhost:8080/api/v1/health
          docker stop mockagents-test
