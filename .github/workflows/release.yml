name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run tests
        run: go test ./... -count=1 -race -timeout 5m

  release-binaries:
    name: Release Binaries
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to mockagents/homebrew-tap. When unset the
          # value is empty and the Homebrew cask upload auto-skips (see
          # .goreleaser.yml).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  release-docker:
    name: Release Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            mockagents/mockagents
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-python:
    name: Release Python SDK
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: sdk/python
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  release-npm:
    name: Release npm packages
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # The npx launcher and the SDK wrappers download the GitHub release binary
      # whose version equals their own package.json version, so a mismatch
      # between the tag and a package version would publish a wrapper that 404s.
      # Guard every publish on tag == package version.
      - name: Verify package versions match the tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for pkg in sdk/npx sdk/typescript sdk/vitest; do
            ver=$(node -p "require('./$pkg/package.json').version")
            if [ "$ver" != "$TAG" ]; then
              echo "::error::$pkg version $ver does not match release tag $TAG"
              exit 1
            fi
          done
          echo "all package versions == $TAG"

      # @mockagents/sdk (TypeScript SDK) — build then publish (scoped → public).
      - name: Publish @mockagents/sdk
        working-directory: sdk/typescript
        run: |
          npm install --no-audit --no-fund
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # @mockagents/vitest (test-runner helper) — resolves @mockagents/sdk via a
      # local file: link at build time, so it does not need the SDK on npm yet.
      - name: Publish @mockagents/vitest
        working-directory: sdk/vitest
        run: |
          npm install --no-audit --no-fund
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # mockagents (npx launcher) — no build step; ships bin/lib only.
      - name: Publish mockagents (npx launcher)
        working-directory: sdk/npx
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  smoke-test:
    name: Post-Release Smoke Test
    needs: [release-binaries, release-docker, release-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker smoke test
        run: |
          TAG="${{ github.ref_name }}"
          docker pull "ghcr.io/${{ github.repository }}:${TAG#v}" || true
          echo "Docker image pull verified"

      - name: Binary smoke test
        run: |
          echo "Release artifacts published successfully"
          echo "Tag: ${{ github.ref_name }}"
