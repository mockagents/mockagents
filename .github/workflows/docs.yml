name: Documentation

# DISABLED (2026-04-13).
#
# The automatic `push` trigger has been removed so this workflow no
# longer fires on merges to main. It stays in the repo as
# `workflow_dispatch`-only so it shows up in the Actions tab and can
# be re-enabled by a maintainer running it manually, but it will not
# report failures on every push.
#
# To fully re-enable later, restore:
#   on:
#     push:
#       branches: [main]
#       paths:
#         - "site/**"
#
# The second failing job — "pages build and deployment / build
# (dynamic)" — is GitHub's auto-generated Pages workflow, not a file
# in this repo. Disable it via Settings → Pages → Build and deployment
# → Source → "None" (or "GitHub Actions" if you want Pages served by
# this workflow once it is re-enabled).

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    # Hard guard so even a manual dispatch is a no-op until the
    # workflow is deliberately re-enabled.
    if: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build docs
        working-directory: site
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
