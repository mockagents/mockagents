name: Documentation

# Builds the MkDocs site and deploys it to GitHub Pages.
#
# Prerequisite (one-time, repo Settings → Pages → Build and deployment):
#   Source = "GitHub Actions"
# On a PRIVATE repository this additionally requires a plan that includes
# Pages for private repos (GitHub Pro/Team/Enterprise), or making the repo
# public. Until Pages is enabled the Pages API returns 404; the build job is
# always safe to run, and the deploy job below is marked continue-on-error so
# an un-provisioned Pages setup does not fail the whole workflow run.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build docs
        working-directory: site
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Best-effort: don't red-X the run when Pages isn't enabled yet (see the
    # header note). Once Pages is provisioned this deploys normally.
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
