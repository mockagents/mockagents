name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Check the [discussions](https://github.com/mockagents/mockagents/discussions) and [CONTRIBUTING.md](https://github.com/mockagents/mockagents/blob/main/CONTRIBUTING.md) first — your idea may already be tracked or be a good first issue."
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: "A concrete scenario: 'When I try to test X, I can't because...'"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "A rough sketch is fine — YAML config, a CLI flag, an API shape."
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New provider / adapter
        - Scenario matching
        - Chaos / fault injection
        - Record & replay
        - MCP
        - SDKs
        - Web console / GUI
        - CLI
        - Multi-tenant / auth
        - Docs
        - Other
    validations:
      required: true
