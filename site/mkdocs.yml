site_name: MockAgents Documentation
site_url: https://mockagents.github.io/mockagents
site_description: Simulate, test, and validate AI agent integrations
repo_url: https://github.com/mockagents/mockagents
repo_name: mockagents/mockagents

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Getting Started:
    - Quickstart: getting-started/quickstart.md
    - Installation: getting-started/installation.md
  - Guides:
    - Testing AI Agents: guides/testing-agents.md
    - Testing with Agent Frameworks: guides/framework-testing.md
    - Scenario Packs: guides/scenario-packs.md
    - Hallucination Testing: guides/hallucination-testing.md
    - Chaos & Fault Injection: guides/chaos.md
    - Load Testing: guides/load-testing.md
    - Strict Tools: guides/strict-tools.md
    - Realtime API (Voice): guides/realtime.md
    - MCP Servers: guides/mcp.md
    - A2A Agents: guides/a2a.md
    - Drop-in Recipes: guides/drop-in-recipes.md
    - Record & Replay: guides/record-replay.md
    - CLI Reference: guides/cli-reference.md
    - YAML Schema: guides/yaml-schema.md
    - Management API: guides/management-api.md
  - SDKs:
    - Python SDK: sdk/python-sdk.md
    - TypeScript SDK: sdk/typescript-sdk.md
    - Go SDK: sdk/go-sdk.md
  - Reference:
    - Agent Definition: reference/agent-definition.md
    - Architecture: reference/architecture.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
