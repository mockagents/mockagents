apiVersion: v1
kind: Pod
metadata:
  name: {{ include "mockagents.fullname" . }}-test-connection
  labels:
    {{- include "mockagents.labels" . | nindent 4 }}
  annotations:
    # "helm test" runs any Pod tagged with the test-hook annotation and
    # deletes it on success. This probe verifies /api/v1/health returns 200.
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: probe
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          set -e
          URL="http://{{ include "mockagents.fullname" . }}:{{ .Values.service.port }}/api/v1/health"
          echo "probing $URL"
          for i in 1 2 3 4 5; do
            if wget -q -O- "$URL"; then
              echo "\nhealth check passed"
              exit 0
            fi
            echo "retry $i..."
            sleep 2
          done
          echo "health check failed"
          exit 1
