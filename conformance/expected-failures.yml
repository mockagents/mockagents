# conformance/expected-failures.yml
#
# Baseline of MCP conformance scenarios the declarative mock does not
# satisfy. The conformance runner treats these as expected (exit 0); a
# NEW failure outside this list, or a listed scenario that starts
# PASSING (stale entry), fails CI. Keep this list exact.
#
# Every entry here requires a behaviour a static, declarative mock does
# not model:
#   * server-INITIATED requests/notifications mid tool-call
#     (sampling/createMessage, elicitation/create, notifications/progress,
#     log notifications) — these need a live bidirectional driver, not a
#     canned response;
#   * stateful URI templates with per-request parameter substitution.
#
# The mock CAN be driven through these flows out-of-band via
# Server.EmitNotification / POST /mcp/notify; the conformance suite
# drives them in-band, which is out of scope for the static fixture.
server:
  - tools-call-with-logging
  - tools-call-with-progress
  - tools-call-sampling
  - tools-call-elicitation
  - elicitation-sep1034-defaults
  - elicitation-sep1330-enums
  - resources-templates-read
